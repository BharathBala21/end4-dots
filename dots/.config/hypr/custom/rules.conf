# You can put custom rules here
# Window/layer rules: https://wiki.hyprland.org/Configuring/Window-Rules/
# Workspace rules: https://wiki.hyprland.org/Configuring/Workspace-Rules/

# ######## Window rules ########

# Uncomment to apply global transparency to all windows:
windowrule = opacity 0.89 override 0.89 override, match:class kitty 
# windowrule = opacity 0.89 override 0.89 override, match:class code
# windowrule = opacity 0.89 override 0.89 override, match:class discord
windowrule = opacity 0.89 override 0.89 override, match:class Spotify

windowrule = match:class .*, no_blur off

# Disable blur for all xwayland apps
# windowrule = no_blur on, match:xwayland 1

windowrule = match:class org.kde.dolphin, float true, size 1280 720
workspace = special:spotify, gapsout:30
workspace = special:discord, gapsout:30
